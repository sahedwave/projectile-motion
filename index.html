<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Trajectory Lab</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap');

  :root {
    --neon: #00d4ff;
    --neon2: #ff6a00;
    --bg: #020810;
    --panel: rgba(4,16,30,0.82);
    --glow: rgba(0,212,255,0.18);
    --red: #ff4060;
    --green: #00ff99;
    --gold: #ffd060;
  }

  * { box-sizing: border-box; }
  body { margin:0; min-height:100vh; min-height:100dvh; background: var(--bg); font-family: 'Rajdhani', sans-serif; color: #cce; overflow: hidden; user-select: none; }
  canvas { display: block; cursor: crosshair; touch-action: none; }

  /* ─── DRAWER TOGGLE ─── */
  #toggle-btn {
    position: absolute; top: 14px; left: 14px; z-index: 30;
    background: var(--panel); border: 1px solid rgba(0,212,255,0.35);
    color: var(--neon); font-family: 'Share Tech Mono', monospace;
    font-size: 12px; letter-spacing: 2px; padding: 8px 18px;
    border-radius: 20px; cursor: pointer; backdrop-filter: blur(10px);
    transition: background 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 12px rgba(0,212,255,0.15);
  }
  #toggle-btn:hover { background: rgba(0,212,255,0.12); box-shadow: 0 0 20px rgba(0,212,255,0.3); }

  /* ─── SIDE PANEL ─── */
  #panel {
    position: absolute; top: 52px; left: 14px; z-index: 20;
    width: 270px;
    background: var(--panel); backdrop-filter: blur(16px);
    border: 1px solid rgba(0,212,255,0.22);
    border-radius: 14px;
    padding: 16px 18px 18px;
    box-shadow: 0 4px 40px rgba(0,0,0,0.6), inset 0 0 20px rgba(0,212,255,0.04);
    overflow: hidden;
    max-height: 0; opacity: 0;
    transition: max-height 0.38s cubic-bezier(0.4,0,0.2,1), opacity 0.28s ease, padding 0.3s;
    padding-top: 0; padding-bottom: 0;
  }
  #panel.open { max-height: 800px; opacity: 1; padding-top: 16px; padding-bottom: 18px; }

  .section-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 3px; color: rgba(0,212,255,0.5);
    text-transform: uppercase; margin: 12px 0 6px; border-bottom: 1px solid rgba(0,212,255,0.1); padding-bottom: 4px;
  }
  .section-label:first-child { margin-top: 0; }

  label.row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: 500; color: #8ab; margin-bottom: 4px; }
  label.row .val { font-family: 'Share Tech Mono', monospace; color: var(--gold); font-size: 13px; }
  label.row .unit { color: #567; font-size: 11px; margin-left: 2px; }

  input[type=range] { width: 100%; accent-color: var(--neon); height: 3px; cursor: pointer; margin-bottom: 10px; }
  select {
    width: 100%; padding: 7px 10px; background: rgba(0,20,40,0.8);
    border: 1px solid rgba(0,212,255,0.2); border-radius: 7px;
    color: #cce; font-family: 'Rajdhani', sans-serif; font-size: 13px;
    cursor: pointer; margin-bottom: 10px; outline: none;
  }

  .toggle-row {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px; border-radius: 8px; cursor: pointer;
    border: 1px solid transparent; font-size: 13px; font-weight: 500;
    color: #8ab; transition: border-color 0.15s, background 0.15s; margin-bottom: 5px;
  }
  .toggle-row:hover { border-color: rgba(0,212,255,0.3); background: rgba(0,212,255,0.05); }
  .toggle-row input[type=checkbox] { accent-color: var(--neon); width: 14px; height: 14px; cursor: pointer; }

  #launch-btn {
    width: 100%; margin-top: 14px; padding: 11px;
    background: linear-gradient(90deg, #ff6a00, #ffae00);
    border: none; border-radius: 9px; color: #fff;
    font-family: 'Share Tech Mono', monospace; font-size: 13px;
    letter-spacing: 2px; cursor: pointer; font-weight: bold;
    transition: filter 0.2s, transform 0.1s;
    box-shadow: 0 0 18px rgba(255,106,0,0.3);
  }
  #launch-btn:hover { filter: brightness(1.18); }
  #launch-btn:active { transform: scale(0.97); }

  /* ─── STAT PILLS ─── */
  .pill {
    position: absolute; right: 14px;
    background: var(--panel); backdrop-filter: blur(10px);
    border: 1px solid rgba(0,212,255,0.18); border-radius: 20px;
    padding: 5px 14px; font-family: 'Share Tech Mono', monospace;
    font-size: 12px; pointer-events: none; white-space: nowrap;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }
  .pill .lbl { color: #567; font-size: 10px; letter-spacing: 1px; }
  .pill .v   { color: var(--gold); margin-left: 6px; }
  .pill .u   { color: #456; font-size: 10px; margin-left: 2px; }
  #p-dist  { top: 16px; }
  #p-vel   { top: 52px; }
  #p-temp  { top: 88px; }
  #p-wind  { top: 124px; }

  /* ─── ENERGY BARS ─── */
  #energy-panel {
    position: absolute; right: 14px; bottom: 14px;
    background: var(--panel); backdrop-filter: blur(10px);
    border: 1px solid rgba(0,212,255,0.15); border-radius: 12px;
    padding: 12px 16px; pointer-events: none; width: 170px;
  }
  .e-label { font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 1px; color: #567; margin-bottom: 8px; }
  .e-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .e-name { font-size: 11px; color: #8ab; width: 22px; font-family: 'Share Tech Mono', monospace; }
  .e-track { flex: 1; background: rgba(255,255,255,0.05); border-radius: 3px; height: 6px; overflow: hidden; }
  .e-bar { height: 100%; border-radius: 3px; transition: width 0.05s; }
  #bar-ke { background: linear-gradient(90deg, #00d4ff, #0088ff); width: 0%; }
  #bar-pe { background: linear-gradient(90deg, #00ff99, #00cc66); width: 0%; }
  #bar-te { background: linear-gradient(90deg, #ff9900, #ff5500); width: 0%; }
  .e-val { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: #567; width: 38px; text-align: right; }

  /* ─── SPACEBAR HINT ─── */
  #hint {
    position: absolute; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    color: rgba(0,212,255,0.4); letter-spacing: 2px;
    animation: fadeHint 4s forwards;
    pointer-events: none;
  }
  @keyframes fadeHint { 0%{opacity:0} 10%{opacity:1} 70%{opacity:1} 100%{opacity:0} }

  #stats-toggle-btn {
    display: none;
    position: absolute;
    top: 14px;
    right: 14px;
    z-index: 30;
    background: var(--panel);
    border: 1px solid rgba(0,212,255,0.35);
    color: var(--neon);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 8px 14px;
    border-radius: 20px;
    box-shadow: 0 0 12px rgba(0,212,255,0.15);
  }

  #touch-launch-btn {
    display: none;
    position: absolute;
    right: 12px;
    bottom: 14px;
    z-index: 34;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1px solid rgba(255,106,0,0.36);
    background: linear-gradient(135deg, rgba(255,106,0,0.96), rgba(255,174,0,0.92));
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px;
    box-shadow: 0 0 22px rgba(255,106,0,0.28);
  }

  @media (max-width: 700px) {
    #stats-toggle-btn {
      display: block;
      top: max(10px, calc(env(safe-area-inset-top) + 6px));
      right: 10px;
    }
    #toggle-btn {
      top: max(10px, calc(env(safe-area-inset-top) + 6px));
      left: 10px;
      padding: 8px 12px;
    }

    #panel {
      left: 10px;
      right: 10px;
      top: 50px;
      width: auto;
    }

    #panel.open {
      max-height: min(70dvh, 620px);
    }

    #energy-panel {
      left: 10px;
      right: 10px;
      bottom: max(10px, env(safe-area-inset-bottom));
      width: auto;
    }

    #touch-launch-btn {
      display: grid;
      place-items: center;
      right: 10px;
      bottom: max(16px, calc(env(safe-area-inset-bottom) + 6px));
    }

    #hint {
      bottom: max(92px, calc(env(safe-area-inset-bottom) + 78px));
      width: calc(100vw - 24px);
      text-align: center;
    }

    body.hud-hidden .pill,
    body.hud-hidden #energy-panel,
    body.hud-hidden #hint {
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
    }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<button id="toggle-btn">⊞ CONTROLS</button>
<button id="stats-toggle-btn">◎ HUD</button>
<button id="touch-launch-btn" type="button">▶</button>
<div id="panel">
  <div class="section-label">ALLIED</div>
  <div class="section-label">Projectil -[S RAHMAN]e</div>
  <select id="ballType">
    <option value="cricket">Cricket Ball — 0.16 kg</option>
    <option value="football">Football — 0.45 kg</option>
    <option value="fuchka">Fuchka — 0.02 kg</option>
  </select>

  <div class="section-label">Launch</div>
  <label class="row">Velocity <span><span class="val" id="pVal">80</span><span class="unit">m/s</span></span></label>
  <input type="range" id="power" min="10" max="400" value="80">
  <label class="row">Angle <span><span class="val" id="aVal">45</span><span class="unit">°</span></span></label>
  <input type="range" id="angle" min="1" max="89" value="45">
  <label class="row">Spin <span><span class="val" id="sVal">0</span><span class="unit">rad/s</span></span></label>
  <input type="range" id="spin" min="-50" max="50" value="0">

  <div class="section-label">Environment</div>
  <label class="row">Wind <span><span class="val" id="wVal">0</span><span class="unit">m/s</span></span></label>
  <input type="range" id="wind" min="-30" max="30" value="0">

  <div class="section-label">Modes</div>
  <label class="toggle-row"><input type="checkbox" id="quantMode"> ⚛ Quantum Jitter</label>
  <label class="toggle-row"><input type="checkbox" id="relMode"> 🌌 Relativity Warp</label>
  <label class="toggle-row"><input type="checkbox" id="bhMode"> 🕳 Singularity Pull</label>
  <label class="toggle-row" id="collToggle"><input type="checkbox" id="collMode"> 🟠 Target Ball</label>

  <button id="launch-btn">▶ ENGAGE</button>
</div>

<!-- stat pills -->
<div class="pill" id="p-dist"><span class="lbl">DIST</span><span class="v" id="s-dist">0</span><span class="u">m</span></div>
<div class="pill" id="p-vel"> <span class="lbl">VEL</span> <span class="v" id="s-vel">0</span><span class="u">m/s</span></div>
<div class="pill" id="p-temp"><span class="lbl">TEMP</span><span class="v" id="s-temp">20</span><span class="u">°C</span></div>
<div class="pill" id="p-wind"><span class="lbl">WIND</span><span class="v" id="s-wind">→ 0</span><span class="u">m/s</span></div>

<!-- energy bars -->
<div id="energy-panel">
  <div class="e-label">ENERGY (J)</div>
  <div class="e-row"><div class="e-name">KE</div><div class="e-track"><div class="e-bar" id="bar-ke"></div></div><div class="e-val" id="ev-ke">0</div></div>
  <div class="e-row"><div class="e-name">PE</div><div class="e-track"><div class="e-bar" id="bar-pe"></div></div><div class="e-val" id="ev-pe">0</div></div>
  <div class="e-row"><div class="e-name">TE</div><div class="e-track"><div class="e-bar" id="bar-te"></div></div><div class="e-val" id="ev-te">0</div></div>
</div>

<div id="hint">PRESS SPACE TO LAUNCH</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const $ = id => document.getElementById(id);

// ─── CONFIG ───────────────────────────────────────────────────────────────────
const CONFIGS = {
  cricket: { mass:0.16, drag:0.47, area:0.004, radius:8,  color:'#f44', rest:0.6, hc:800  },
  football:{ mass:0.45, drag:0.25, area:0.038, radius:14, color:'#eee', rest:0.8, hc:1200 },
  fuchka:  { mass:0.02, drag:0.8,  area:0.002, radius:6,  color:'#fd4', rest:0.2, hc:200  }
};
const RHO = 1.225; // air density
const G   = 9.81;
const WS  = 12;    // world scale (px per meter)
const DT  = 1/60;

// ─── STATE ────────────────────────────────────────────────────────────────────
let W, H, groundY;
let cameraX = 0;
let rotation = 0;
let mouse = {x:0,y:0};
let balls  = [];      // [mainBall, targetBall]
let initKE = 0;
let t = 0;
let terrain = [];     // [{x,y}] world-space points

// terrain generation
function buildTerrain() {
  terrain = [];
  for(let wx = -200; wx <= 4000; wx += 4) {
    const y = groundY
      - Math.sin(wx * 0.008) * 30
      - Math.sin(wx * 0.022 + 1.2) * 14
      - Math.sin(wx * 0.055 + 0.5) * 7;
    terrain.push({x: wx, y});
  }
}

function terrainY(wx) {
  // wx in screen pixels from world origin
  for(let i=0; i<terrain.length-1; i++) {
    if(terrain[i].x <= wx && terrain[i+1].x > wx) {
      const f = (wx - terrain[i].x) / (terrain[i+1].x - terrain[i].x);
      return terrain[i].y + f*(terrain[i+1].y - terrain[i].y);
    }
  }
  return groundY;
}

function terrainNormal(wx) {
  const dx = 8;
  const y1 = terrainY(wx - dx);
  const y2 = terrainY(wx + dx);
  const slope = (y2 - y1) / (2*dx);
  const len = Math.hypot(1, slope);
  return { nx: -slope/len, ny: 1/len };
}

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  groundY = H * 0.82;
  buildTerrain();
}
window.addEventListener('resize', resize);
window.addEventListener('pointermove', e => { mouse.x=e.clientX; mouse.y=e.clientY; });
window.addEventListener('pointerdown', e => { mouse.x=e.clientX; mouse.y=e.clientY; });
resize();

// ─── SLIDERS ──────────────────────────────────────────────────────────────────
['power','angle','spin','wind'].forEach(id => {
  $(id).oninput = () => {
    const map = {power:'pVal',angle:'aVal',spin:'sVal',wind:'wVal'};
    $(map[id]).textContent = $(id).value;
    if(id==='wind') updateWindPill();
    updatePrediction();
  };
});
function updateWindPill() {
  const w = +$('wind').value;
  $('s-wind').textContent = (w===0 ? '→ 0' : w>0 ? `→ ${w}` : `← ${Math.abs(w)}`);
}
updateWindPill();

// panel toggle
$('toggle-btn').onclick = () => $('panel').classList.toggle('open');
function updateHudToggleLabel() {
  const mobile = window.matchMedia('(max-width: 700px)').matches;
  $('stats-toggle-btn').textContent = mobile
    ? (document.body.classList.contains('hud-hidden') ? '◎' : '✕')
    : (document.body.classList.contains('hud-hidden') ? '◎ HUD' : '✕ HUD');
}
$('stats-toggle-btn').onclick = () => {
  document.body.classList.toggle('hud-hidden');
  updateHudToggleLabel();
};
$('touch-launch-btn').onclick = launch;
function syncMobileHudUi() {
  const mobile = window.matchMedia('(max-width: 700px)').matches;
  $('toggle-btn').textContent = mobile ? '⊞' : '⊞ CONTROLS';
  $('hint').textContent = mobile ? 'TAP ▶ TO LAUNCH' : 'PRESS SPACE TO LAUNCH';
  if(mobile){
    document.body.classList.add('hud-hidden');
  } else {
    document.body.classList.remove('hud-hidden');
  }
  updateHudToggleLabel();
}
syncMobileHudUi();
window.addEventListener('resize', syncMobileHudUi);

// ─── LAUNCH ───────────────────────────────────────────────────────────────────
function mkBall(type, x, y, vx, vy, spin) {
  const cfg = CONFIGS[type];
  return { ...cfg, x, y, vx, vy, spin, trail:[], active:true, temp:20,
           flash:0, hitFlash:0 };
}

function launch() {
  const type = $('ballType').value;
  const p  = +$('power').value;
  const a  = (+$('angle').value) * Math.PI / 180;
  const sp = +$('spin').value;
  const sx = 120;
  const sy = terrainY(sx) - 4;
  const vx = p * Math.cos(a);
  const vy = -p * Math.sin(a);

  const main = mkBall(type, sx, sy, vx, vy, sp);
  initKE = 0.5 * main.mass * p * p;
  rotation = 0;

  cannonFlash = 1;
  balls = [main];
  if($('collMode').checked) {
    // target ball 220m ahead in world pixels
    const tx = sx + 220 * WS;
    const ty = terrainY(tx) - CONFIGS['football'].radius;
    balls.push(mkBall('football', tx, ty, 0, 0, 0));
    balls[1].isTarget = true;
  }
}

$('launch-btn').onclick = launch;
document.addEventListener('keydown', e => { if(e.code==='Space'){ e.preventDefault(); launch(); } });

// ─── PREDICTION ARC ───────────────────────────────────────────────────────────
let prediction = [];
function updatePrediction() {
  const type = $('ballType').value;
  const cfg  = CONFIGS[type];
  const p    = +$('power').value;
  const a    = (+$('angle').value) * Math.PI / 180;
  const sp   = +$('spin').value;
  const wnd  = +$('wind').value;

  let x  = 120, y  = terrainY(120) - 4;
  let vx = p * Math.cos(a), vy = -p * Math.sin(a);
  prediction = [{x,y}];

  for(let i = 0; i < 2000; i++) {
    const spd = Math.hypot(vx,vy);
    const rvx = vx - wnd, rvy = vy;
    const rspd = Math.hypot(rvx,rvy) || 1e-9;
    const Fd = 0.5 * RHO * cfg.drag * cfg.area * rspd * rspd;
    let ax = -(Fd * rvx / rspd) / cfg.mass;
    let ay = G - (Fd * rvy / rspd) / cfg.mass;
    ay -= (sp * vx * 0.08) / cfg.mass;  // magnus

    vx += ax * DT; vy += ay * DT;
    x  += vx * DT * WS; y  += vy * DT * WS;

    const ty = terrainY(x);
    if(y >= ty) { prediction.push({x, y:ty}); break; }
    if(i % 3 === 0) prediction.push({x,y});
  }
}
updatePrediction();
$('ballType').onchange = updatePrediction;
$('collMode').onchange = updatePrediction;

// ─── PHYSICS STEP ─────────────────────────────────────────────────────────────
function stepBall(b, wnd, bhOn, quantum) {
  if(!b.active) return;
  const spd = Math.hypot(b.vx, b.vy);
  const rvx = b.vx - wnd, rvy = b.vy;
  const rspd = Math.hypot(rvx, rvy) || 1e-9;
  const Fd = 0.5 * RHO * b.drag * b.area * rspd * rspd;

  let ax = -(Fd * rvx / rspd) / b.mass;
  let ay = G - (Fd * rvy / rspd) / b.mass;
  ay -= (b.spin * b.vx * 0.08) / b.mass; // magnus

  if(bhOn) {
    const cx = cameraX + W/2, cy = H/2;
    const dx = cx - b.x, dy = cy - b.y;
    const dist2 = Math.max(200, dx*dx + dy*dy);
    const f = 9000 / dist2;
    ax += dx * f; ay += dy * f;
  }

  if(quantum) { ax += (Math.random()-0.5)*20; ay += (Math.random()-0.5)*20; }

  b.vx += ax * DT; b.vy += ay * DT;
  b.x  += b.vx * DT * WS; b.y  += b.vy * DT * WS;
  b.temp += (Fd * rspd * DT) / b.hc;
  b.temp -= (b.temp - 20) * 0.01;
  b.flash = Math.max(0, b.flash - 0.05);

  const ty = terrainY(b.x);
  if(b.y >= ty) {
    b.y = ty;
    const n = terrainNormal(b.x);
    const dot = b.vx * n.nx + b.vy * n.ny;
    b.vx = (b.vx - 2*dot*n.nx) * b.rest * 0.9;
    b.vy = (b.vy - 2*dot*n.ny) * b.rest;
    if(Math.abs(b.vy) < 3 && Math.abs(b.vx) < 2) b.active = false;
  }

  b.trail.push({x:b.x, y:b.y});
  if(b.trail.length > 120) b.trail.shift();
}

function checkCollision(a, b) {
  if(!a.active || !b.active) return;
  const dx = b.x - a.x, dy = b.y - a.y;
  const dist = Math.hypot(dx,dy);
  const minD = a.radius + b.radius;
  if(dist > minD) return;

  // separate
  const overlap = (minD - dist) / 2;
  const nx = dx/dist, ny = dy/dist;
  a.x -= nx*overlap; a.y -= ny*overlap;
  b.x += nx*overlap; b.y += ny*overlap;

  // elastic exchange
  const dvx = a.vx - b.vx, dvy = a.vy - b.vy;
  const dot  = dvx*nx + dvy*ny;
  if(dot <= 0) return;
  const imp  = 2*dot / (a.mass + b.mass);
  a.vx -= imp * b.mass * nx; a.vy -= imp * b.mass * ny;
  b.vx += imp * a.mass * nx; b.vy += imp * a.mass * ny;
  a.flash = 1; b.flash = 1;
}

// ─── DRAW HELPERS ─────────────────────────────────────────────────────────────
function arrow(x, y, vx, vy, color, label) {
  const len = 55, mag = Math.hypot(vx,vy)||1;
  const ex = x + (vx/mag)*len, ey = y + (vy/mag)*len;
  ctx.strokeStyle = color; ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(ex,ey); ctx.stroke();
  // arrowhead
  const ang = Math.atan2(ey-y, ex-x);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(ex, ey);
  ctx.lineTo(ex - 9*Math.cos(ang-0.4), ey - 9*Math.sin(ang-0.4));
  ctx.lineTo(ex - 9*Math.cos(ang+0.4), ey - 9*Math.sin(ang+0.4));
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = color;
  ctx.font = '11px Share Tech Mono';
  ctx.fillText(label, ex+5, ey-3);
}

function drawBall(b, rot) {
  const hr = Math.min(1, (b.temp-20)/800);
  ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(rot);
  if(b.flash > 0) { ctx.shadowBlur = 30; ctx.shadowColor = '#fff'; }
  else { ctx.shadowBlur = 12; ctx.shadowColor = hr>0.5 ? `rgba(255,${Math.round(150-hr*150)},0,0.7)` : 'rgba(0,200,255,0.4)'; }
  ctx.fillStyle = b.flash>0 ? '#fff' : (b.temp>700?'#fff': b.temp>300?'#ff8800': b.color);
  ctx.beginPath(); ctx.arc(0,0,b.radius,0,Math.PI*2); ctx.fill();
  // seam
  ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-b.radius,0); ctx.lineTo(b.radius,0); ctx.stroke();
  ctx.restore();
}

// ─── CANNON ───────────────────────────────────────────────────────────────────
let cannonFlash = 0; // 0..1, bright muzzle flash on launch

function drawCannon() {
  const cx = 120;
  const cy = terrainY(120);
  const angle = -(+$('angle').value) * Math.PI / 180;

  // barrel length & width
  const bLen = 44, bW = 11;

  ctx.save();
  ctx.translate(cx, cy);

  // ── Wheels ──
  const wheelY = 4;
  for(let side of [-18, 18]) {
    // outer wheel
    ctx.beginPath(); ctx.arc(side, wheelY, 13, 0, Math.PI*2);
    const wg = ctx.createRadialGradient(side,wheelY,2,side,wheelY,13);
    wg.addColorStop(0,'#5a4a38'); wg.addColorStop(1,'#2a1e10');
    ctx.fillStyle = wg; ctx.fill();
    ctx.strokeStyle='#7a6040'; ctx.lineWidth=1.5; ctx.stroke();
    // spokes
    for(let s=0;s<6;s++){
      const sa = (Math.PI/3)*s + t*0.01;
      ctx.strokeStyle='rgba(100,80,50,0.7)'; ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(side+4*Math.cos(sa), wheelY+4*Math.sin(sa));
      ctx.lineTo(side+11*Math.cos(sa), wheelY+11*Math.sin(sa));
      ctx.stroke();
    }
    // hub
    ctx.beginPath(); ctx.arc(side,wheelY,3.5,0,Math.PI*2);
    ctx.fillStyle='#c0a060'; ctx.fill();
  }

  // ── Carriage body ──
  ctx.beginPath();
  ctx.roundRect(-22, -4, 44, 14, 4);
  const cg = ctx.createLinearGradient(0,-4,0,10);
  cg.addColorStop(0,'#6b4f2a'); cg.addColorStop(1,'#3a2810');
  ctx.fillStyle=cg; ctx.fill();
  ctx.strokeStyle='#8a6030'; ctx.lineWidth=1.2; ctx.stroke();

  // ── Pivot pin ──
  ctx.beginPath(); ctx.arc(0,-2,5,0,Math.PI*2);
  ctx.fillStyle='#9a8060'; ctx.fill();
  ctx.strokeStyle='#c0a060'; ctx.lineWidth=1; ctx.stroke();

  // ── Barrel (rotates with angle) ──
  ctx.rotate(angle);

  // barrel shadow/glow
  ctx.shadowColor='rgba(0,0,0,0.6)'; ctx.shadowBlur=8;

  // barrel body
  const bg = ctx.createLinearGradient(0,-bW,0,bW);
  bg.addColorStop(0,'#8a8a8a');
  bg.addColorStop(0.4,'#cccccc');
  bg.addColorStop(1,'#3a3a3a');
  ctx.fillStyle=bg;
  ctx.beginPath();
  ctx.roundRect(0, -bW/2, bLen, bW, [2,6,6,2]);
  ctx.fill();
  ctx.strokeStyle='#555'; ctx.lineWidth=1; ctx.stroke();

  // reinforcement rings
  for(let rx of [8, 18, 28]) {
    ctx.beginPath(); ctx.rect(rx, -bW/2-1, 5, bW+2);
    const rg = ctx.createLinearGradient(0,-bW/2,0,bW/2);
    rg.addColorStop(0,'#aaa'); rg.addColorStop(0.5,'#eee'); rg.addColorStop(1,'#555');
    ctx.fillStyle=rg; ctx.fill();
    ctx.strokeStyle='#444'; ctx.lineWidth=0.8; ctx.stroke();
  }

  // muzzle lip
  ctx.beginPath(); ctx.ellipse(bLen, 0, 4, bW/2+2, 0, -Math.PI/2, Math.PI/2);
  ctx.fillStyle='#999'; ctx.fill();
  ctx.strokeStyle='#555'; ctx.lineWidth=1; ctx.stroke();

  // touch-hole
  ctx.beginPath(); ctx.arc(12, -bW/2+1, 2, 0, Math.PI*2);
  ctx.fillStyle='#222'; ctx.fill();

  ctx.shadowBlur = 0;

  // ── Muzzle flash on launch ──
  if(cannonFlash > 0) {
    const mx = bLen + 6, my = 0;
    const numRays = 10;
    ctx.save();
    ctx.globalAlpha = cannonFlash;
    // inner bloom
    const fg = ctx.createRadialGradient(mx,my,0,mx,my,28*cannonFlash);
    fg.addColorStop(0,'rgba(255,255,200,1)');
    fg.addColorStop(0.3,'rgba(255,160,30,0.8)');
    fg.addColorStop(1,'rgba(255,80,0,0)');
    ctx.fillStyle=fg;
    ctx.beginPath(); ctx.arc(mx,my,28*cannonFlash,0,Math.PI*2); ctx.fill();
    // rays
    for(let i=0;i<numRays;i++){
      const ra = (Math.PI*2/numRays)*i + t*0.3;
      const rlen = (16+Math.random()*14)*cannonFlash;
      ctx.strokeStyle=`rgba(255,200,80,${cannonFlash*0.7})`;
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(mx+4*Math.cos(ra), my+4*Math.sin(ra));
      ctx.lineTo(mx+rlen*Math.cos(ra), my+rlen*Math.sin(ra));
      ctx.stroke();
    }
    // smoke puff
    for(let i=0;i<5;i++){
      const sr = (1-cannonFlash);
      ctx.beginPath();
      ctx.arc(mx+(14+i*8)*sr, my+(Math.sin(i+t*0.2)*6)*sr, (6+i*3)*(1-sr*0.5), 0, Math.PI*2);
      ctx.fillStyle=`rgba(180,180,180,${cannonFlash*0.18})`;
      ctx.fill();
    }
    ctx.restore();
    cannonFlash -= 0.045;
    if(cannonFlash < 0) cannonFlash = 0;
  }

  ctx.restore();
}

// ─── COSMETICS: BLACK HOLE + WHITE HOLE ───────────────────────────────────────
function drawCelestials() {
  // ── BLACK HOLE (upper right) ──
  const bhx = W - 160, bhy = 130;
  const tr  = t * 0.004;

  // distant glow halo
  const bgrad = ctx.createRadialGradient(bhx,bhy,40,bhx,bhy,160);
  bgrad.addColorStop(0, 'rgba(60,10,100,0.12)');
  bgrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = bgrad; ctx.beginPath(); ctx.arc(bhx,bhy,160,0,Math.PI*2); ctx.fill();

  // accretion disk rings (ellipse approximation)
  for(let i=3; i>=0; i--) {
    const rx = 70 + i*14, ry = 18 + i*4;
    const cols = ['rgba(255,140,20,0.25)','rgba(255,180,40,0.2)','rgba(220,100,10,0.15)','rgba(150,60,5,0.1)'];
    ctx.save(); ctx.translate(bhx,bhy); ctx.rotate(tr + i*0.25);
    ctx.beginPath(); ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI*2);
    ctx.strokeStyle = cols[i]; ctx.lineWidth = 8-i*1.5; ctx.stroke();
    ctx.restore();
  }

  // photon ring
  const pg = ctx.createRadialGradient(bhx,bhy,30,bhx,bhy,46);
  pg.addColorStop(0,'rgba(255,255,200,0.0)');
  pg.addColorStop(0.7,'rgba(255,240,150,0.5)');
  pg.addColorStop(1,'rgba(255,180,50,0.0)');
  ctx.fillStyle = pg; ctx.beginPath(); ctx.arc(bhx,bhy,46,0,Math.PI*2); ctx.fill();

  // lensing arcs
  ctx.save(); ctx.translate(bhx,bhy);
  for(let k=0; k<2; k++) {
    ctx.save(); ctx.scale(1, k===0?-1:1);
    ctx.beginPath(); ctx.arc(0, -30, 62, Math.PI+0.3, Math.PI*2-0.3);
    ctx.strokeStyle = 'rgba(255,220,100,0.18)'; ctx.lineWidth = 2; ctx.stroke();
    ctx.restore();
  }
  ctx.restore();

  // relativistic jet
  const jg = ctx.createLinearGradient(bhx,bhy-38,bhx,bhy-110);
  jg.addColorStop(0,'rgba(160,80,255,0.35)'); jg.addColorStop(1,'rgba(100,50,200,0)');
  ctx.fillStyle = jg;
  const jw = 5 + Math.sin(t*0.07)*2;
  ctx.beginPath(); ctx.moveTo(bhx-jw,bhy-38); ctx.lineTo(bhx,bhy-115); ctx.lineTo(bhx+jw,bhy-38); ctx.fill();

  // event horizon
  const ehg = ctx.createRadialGradient(bhx,bhy,0,bhx,bhy,34);
  ehg.addColorStop(0,'rgba(0,0,0,1)'); ehg.addColorStop(0.8,'rgba(2,2,8,1)'); ehg.addColorStop(1,'rgba(5,5,20,0)');
  ctx.fillStyle = ehg; ctx.beginPath(); ctx.arc(bhx,bhy,34,0,Math.PI*2); ctx.fill();

  // ── WHITE HOLE (upper left) ──
  const whx = 200, why = 120;
  const tr2 = -t * 0.005;

  // outer glow
  const wgrad = ctx.createRadialGradient(whx,why,0,whx,why,140);
  wgrad.addColorStop(0,'rgba(200,230,255,0.06)'); wgrad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = wgrad; ctx.beginPath(); ctx.arc(whx,why,140,0,Math.PI*2); ctx.fill();

  // ejection arcs
  ctx.save(); ctx.translate(whx,why); ctx.rotate(tr2);
  for(let i=0; i<6; i++) {
    ctx.save(); ctx.rotate((Math.PI*2/6)*i);
    const ag = ctx.createLinearGradient(0,28,0,85);
    ag.addColorStop(0,'rgba(180,230,255,0.45)'); ag.addColorStop(1,'rgba(100,200,255,0)');
    ctx.strokeStyle = ag; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(0,28); ctx.lineTo(6,70); ctx.stroke();
    ctx.restore();
  }
  ctx.restore();

  // pulsing ring
  const pulse = 0.5 + 0.5*Math.sin(t*0.08);
  ctx.strokeStyle = `rgba(200,240,255,${0.15+pulse*0.15})`;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(whx,why,38+pulse*8,0,Math.PI*2); ctx.stroke();

  // twin jets
  for(let dir of [-1,1]) {
    const jg2 = ctx.createLinearGradient(whx,why+dir*28,whx,why+dir*100);
    jg2.addColorStop(0,'rgba(180,230,255,0.4)'); jg2.addColorStop(1,'rgba(100,200,255,0)');
    ctx.fillStyle = jg2;
    ctx.beginPath(); ctx.moveTo(whx-4,why+dir*28); ctx.lineTo(whx,why+dir*100); ctx.lineTo(whx+4,why+dir*28); ctx.fill();
  }

  // singularity core
  const sg = ctx.createRadialGradient(whx,why,0,whx,why,26);
  sg.addColorStop(0,'rgba(255,255,255,0.95)'); sg.addColorStop(0.5,'rgba(200,230,255,0.5)'); sg.addColorStop(1,'rgba(100,200,255,0)');
  ctx.fillStyle = sg; ctx.beginPath(); ctx.arc(whx,why,26,0,Math.PI*2); ctx.fill();
}

// ─── DRAW WIND STREAKS ───────────────────────────────────────────────────────
const windParticles = Array.from({length:25},() => ({x:Math.random()*3000, y:Math.random()*400+200, alpha:Math.random()}));
function drawWind(wnd) {
  if(wnd===0) return;
  const spd = wnd * WS * DT * 60;
  ctx.save();
  windParticles.forEach(p => {
    p.x += spd * 0.4; p.alpha -= 0.012;
    if(p.alpha <= 0 || p.x < -cameraX-100 || p.x > -cameraX+W+100) {
      p.x = wnd>0 ? -cameraX-50 : -cameraX+W+50;
      p.y = Math.random()*groundY*0.9 + 50;
      p.alpha = 0.5+Math.random()*0.4;
    }
    const len = Math.abs(wnd)*2;
    ctx.strokeStyle = `rgba(120,200,255,${p.alpha*0.35})`;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x+(wnd>0?len:-len),p.y); ctx.stroke();
  });
  ctx.restore();
}

// ─── DRAW TERRAIN ─────────────────────────────────────────────────────────────
function drawTerrain() {
  ctx.beginPath();
  ctx.moveTo(terrain[0].x, terrain[0].y);
  terrain.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.lineTo(terrain[terrain.length-1].x, H+20);
  ctx.lineTo(terrain[0].x, H+20);
  ctx.closePath();

  const tg = ctx.createLinearGradient(0, groundY-40, 0, H);
  tg.addColorStop(0,'rgba(20,80,100,0.55)');
  tg.addColorStop(1,'rgba(2,10,20,0.8)');
  ctx.fillStyle = tg; ctx.fill();

  // glowing edge
  ctx.strokeStyle = 'rgba(0,212,255,0.35)'; ctx.lineWidth = 2;
  ctx.setLineDash([6,8]);
  ctx.beginPath();
  terrain.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
  ctx.stroke(); ctx.setLineDash([]);
}

// ─── DRAW PREDICTION ─────────────────────────────────────────────────────────
function drawPrediction() {
  if(prediction.length < 2) return;
  ctx.save();
  for(let i=1; i<prediction.length; i++) {
    const f = i/prediction.length;
    ctx.strokeStyle = `rgba(0,212,255,${f*0.35})`;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4,6]);
    ctx.beginPath();
    ctx.moveTo(prediction[i-1].x, prediction[i-1].y);
    ctx.lineTo(prediction[i].x, prediction[i].y);
    ctx.stroke();
  }
  ctx.setLineDash([]);
  // landing X
  const lp = prediction[prediction.length-1];
  ctx.strokeStyle = 'rgba(255,180,0,0.7)'; ctx.lineWidth = 1.5; ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(lp.x-8,lp.y-8); ctx.lineTo(lp.x+8,lp.y+8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(lp.x+8,lp.y-8); ctx.lineTo(lp.x-8,lp.y+8); ctx.stroke();
  const dm = Math.round((lp.x - 120)/WS);
  ctx.fillStyle = 'rgba(255,200,80,0.75)'; ctx.font = '10px Share Tech Mono';
  ctx.fillText(`${dm}m`, lp.x+12, lp.y-2);
  ctx.restore();
}

// ─── STARFIELD ────────────────────────────────────────────────────────────────
const stars = Array.from({length:180},()=>({x:Math.random()*3000,y:Math.random()*H*0.85,r:Math.random()*1.2+0.2,a:0.3+Math.random()*0.5,twinkle:Math.random()*Math.PI*2}));
function drawStars() {
  stars.forEach(s => {
    s.twinkle += 0.03;
    const a = s.a * (0.7+0.3*Math.sin(s.twinkle));
    ctx.fillStyle = `rgba(200,220,255,${a})`;
    ctx.beginPath(); ctx.arc(s.x - cameraX*0.05, s.y, s.r, 0, Math.PI*2); ctx.fill();
  });
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
function loop() {
  t++;
  ctx.fillStyle = '#020810';
  ctx.fillRect(0, 0, W, H);

  drawStars();
  drawCelestials();

  const wnd    = +$('wind').value;
  const bhOn   = $('bhMode').checked;
  const relOn  = $('relMode').checked;
  const qOn    = $('quantMode').checked;

  // step physics
  balls.forEach(b => {
    if(!b.isTarget) stepBall(b, wnd, bhOn, qOn);
    else if(b.active) { /* stationary until hit */ }
  });

  // collision
  if(balls.length===2) checkCollision(balls[0], balls[1]);
  // after hit, target steps too
  if(balls.length===2 && balls[1].flash>0) stepBall(balls[1], wnd, bhOn, false);
  if(balls.length===2 && balls[1].flash<=0 && balls[1].active && (balls[1].vx!==0||balls[1].vy!==0))
    stepBall(balls[1], wnd, bhOn, false);

  // camera
  const main = balls[0];
  if(main) {
    const target = main.active ? Math.max(0, main.x - W*0.38) : 0;
    cameraX += (target - cameraX) * 0.1;
  }

  // warp shake
  const warp = (relOn && main && main.active) ? Math.min(8, Math.hypot(main.vx,main.vy)/25) : 0;

  ctx.save();
  ctx.translate(-cameraX + (Math.random()*warp-warp/2), Math.random()*warp*0.5);

  drawWind(wnd);
  drawTerrain();

  // prediction (only before or after)
  if(!main || !main.active) drawPrediction();

  // cannon
  drawCannon();

  // trails
  balls.forEach(b => {
    if(b.trail.length < 2) return;
    for(let i=1; i<b.trail.length; i++) {
      const f = i/b.trail.length;
      ctx.strokeStyle = b.isTarget ? `rgba(255,150,0,${f*0.5})` : `rgba(0,212,255,${f*0.55})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(b.trail[i-1].x,b.trail[i-1].y); ctx.lineTo(b.trail[i].x,b.trail[i].y); ctx.stroke();
    }
  });

  // draw balls
  if(main) {
    rotation += (main.spin||0)*DT;
    drawBall(main, rotation);
    if(main.active) {
      arrow(main.x,main.y, main.vx,main.vy, '#00ffcc','V');
      arrow(main.x,main.y, 0,9.81, '#ff4060','G');
      if(wnd!==0) arrow(main.x,main.y, wnd*3,0, '#4499ff','W');
    }
  }
  if(balls[1]) drawBall(balls[1], 0);

  ctx.restore();

  // ── LENS ──
  const lx = mouse.x, ly = mouse.y;
  ctx.save();
  ctx.beginPath(); ctx.arc(lx,ly,88,0,Math.PI*2); ctx.clip();
  ctx.fillStyle='#020810'; ctx.fill();
  ctx.save();
  ctx.translate(lx,ly); ctx.scale(2.8,2.8); ctx.translate(-(lx+cameraX), -ly);
  // redraw terrain & balls in lens space
  drawTerrain();
  balls.forEach(b => {
    if(b.trail.length<2) return;
    for(let i=1;i<b.trail.length;i++){
      const f=i/b.trail.length;
      ctx.strokeStyle=b.isTarget?`rgba(255,150,0,${f*0.5})`:`rgba(0,212,255,${f*0.55})`;
      ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(b.trail[i-1].x,b.trail[i-1].y);ctx.lineTo(b.trail[i].x,b.trail[i].y);ctx.stroke();
    }
  });
  if(main) drawBall(main, rotation);
  if(balls[1]) drawBall(balls[1],0);
  ctx.restore();
  ctx.restore();

  // lens ring + crosshairs
  ctx.strokeStyle='rgba(0,212,255,0.7)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(lx,ly,88,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle='rgba(0,212,255,0.25)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(lx-88,ly); ctx.lineTo(lx+88,ly); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(lx,ly-88); ctx.lineTo(lx,ly+88); ctx.stroke();
  // tick marks
  for(let a=0;a<360;a+=30){
    const rad=a*Math.PI/180, r1=84, r2=a%90===0?76:80;
    ctx.strokeStyle=a%90===0?'rgba(0,212,255,0.6)':'rgba(0,212,255,0.25)';
    ctx.lineWidth=a%90===0?2:1;
    ctx.beginPath();
    ctx.moveTo(lx+r1*Math.cos(rad),ly+r1*Math.sin(rad));
    ctx.lineTo(lx+r2*Math.cos(rad),ly+r2*Math.sin(rad));
    ctx.stroke();
  }

  // ── STATS ──
  if(main) {
    const spd = Math.hypot(main.vx, main.vy);
    $('s-dist').textContent  = Math.max(0, Math.round((main.x-120)/WS));
    $('s-vel').textContent   = Math.round(spd);
    $('s-temp').textContent  = Math.round(main.temp);

    // energy bars
    const ke = 0.5 * main.mass * spd * spd;
    const h  = Math.max(0, groundY - main.y);
    const pe = main.mass * G * (h/WS);
    const te = ke + pe;
    const maxE = Math.max(initKE, 1);
    $('bar-ke').style.width = Math.min(100, ke/maxE*100)+'%';
    $('bar-pe').style.width = Math.min(100, pe/maxE*100)+'%';
    $('bar-te').style.width = Math.min(100, te/maxE*100)+'%';
    $('ev-ke').textContent  = Math.round(ke)+'J';
    $('ev-pe').textContent  = Math.round(pe)+'J';
    $('ev-te').textContent  = Math.round(te)+'J';
  }

  requestAnimationFrame(loop);
}

loop();
</script>
